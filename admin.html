<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — LUXE STORE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <style>
    body { overflow-x: hidden; }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 240px; background: #0a0a0a; border-right: 1px solid var(--border); padding: 0; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; display: flex; flex-direction: column; }
    .admin-logo { padding: 28px 24px; border-bottom: 1px solid var(--border); }
    .admin-logo a { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); letter-spacing: 4px; text-decoration: none; display: block; }
    .admin-logo span { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); display: block; margin-top: 2px; }
    .admin-nav { padding: 16px 0; flex: 1; }
    .admin-nav-section { padding: 8px 24px 4px; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }
    .admin-nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 24px; font-size: 0.82rem; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; border-left: 2px solid transparent; }
    .admin-nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
    .admin-nav-item.active { color: var(--gold); background: rgba(201,168,76,0.07); border-left-color: var(--gold); }
    .admin-nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .admin-nav-item .badge { margin-left: auto; background: var(--gold); color: #000; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; font-weight: 700; }
    .admin-footer { padding: 20px 24px; border-top: 1px solid var(--border); }
    .admin-user { display: flex; align-items: center; gap: 10px; }
    .admin-avatar { width: 32px; height: 32px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #000; font-weight: 700; }
    .admin-user-info { flex: 1; min-width: 0; }
    .admin-user-name { font-size: 0.8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-user-role { font-size: 0.65rem; color: var(--text-muted); }

    .admin-main { margin-left: 240px; flex: 1; min-height: 100vh; }
    .admin-topbar { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-primary); position: sticky; top: 0; z-index: 50; }
    .admin-topbar h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
    .topbar-actions { display: flex; gap: 12px; align-items: center; }
    .admin-content { padding: 32px; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 36px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
    .stat-label { font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .stat-value { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 600; margin-bottom: 8px; }
    .stat-change { font-size: 0.75rem; display: flex; align-items: center; gap: 4px; }
    .stat-change.up { color: #22c55e; }
    .stat-change.down { color: #ef4444; }

    .admin-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; margin-bottom: 32px; }
    .admin-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; }
    .panel-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .panel-header h3 { font-family: 'Playfair Display', serif; font-size: 1rem; }
    .panel-body { padding: 0; }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { padding: 12px 16px; font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); text-align: left; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }
    .data-table td { padding: 14px 16px; font-size: 0.82rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
    .status-pending { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .status-processing { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .status-shipped { background: rgba(139,92,246,0.15); color: #8b5cf6; }
    .status-delivered { background: rgba(34,197,94,0.15); color: #22c55e; }
    .status-cancelled { background: rgba(239,68,68,0.15); color: #ef4444; }
    .action-btns { display: flex; gap: 6px; }
    .action-btn { padding: 4px 10px; border-radius: 2px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 0.7rem; cursor: pointer; transition: all 0.2s; font-family: 'Montserrat', sans-serif; }
    .action-btn:hover { border-color: var(--gold); color: var(--gold); }
    .action-btn.danger:hover { border-color: #ef4444; color: #ef4444; }

    .product-thumb { width: 44px; height: 52px; object-fit: cover; border-radius: 2px; background: var(--bg-secondary); }
    .product-cell { display: flex; align-items: center; gap: 12px; }
    .product-cell-info .name { font-size: 0.82rem; font-weight: 500; }
    .product-cell-info .cat { font-size: 0.72rem; color: var(--text-muted); }

    .top-products-list { list-style: none; padding: 0; margin: 0; }
    .top-product-item { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .top-product-item:last-child { border-bottom: none; }
    .rank { font-size: 1.2rem; font-family: 'Playfair Display', serif; color: var(--gold); width: 28px; text-align: center; }
    .top-product-img { width: 40px; height: 48px; object-fit: cover; border-radius: 2px; background: var(--bg-secondary); }
    .top-product-info { flex: 1; min-width: 0; }
    .top-product-name { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-product-sales { font-size: 0.72rem; color: var(--text-muted); }
    .top-product-revenue { font-size: 0.85rem; font-weight: 600; color: var(--gold); }

    /* Sections */
    .admin-section { display: none; }
    .admin-section.active { display: block; }

    /* Search + filter bar */
    .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    .toolbar input { background: var(--surface); border: 1px solid var(--border); color: var(--text-primary); padding: 9px 14px; font-family: 'Montserrat', sans-serif; font-size: 0.82rem; border-radius: 2px; min-width: 220px; }
    .toolbar input:focus { outline: none; border-color: var(--gold); }
    .toolbar select { background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); padding: 9px 14px; font-family: 'Montserrat', sans-serif; font-size: 0.82rem; border-radius: 2px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 24px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; }
    .modal-body { padding: 28px; }
    .modal-footer { padding: 20px 28px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text-primary); padding: 11px 14px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; border-radius: 2px; transition: border-color 0.3s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--gold); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .admin-grid { grid-template-columns: 1fr; } }
    @media (max-width: 768px) { .admin-sidebar { transform: translateX(-100%); } .admin-main { margin-left: 0; } .stats-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="modal-overlay" id="productModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Product</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editingId" />
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="pName" placeholder="e.g. Obsidian Trench Coat" />
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label>Price ($) *</label>
            <input type="number" id="pPrice" placeholder="199" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label>Sale Price ($)</label>
            <input type="number" id="pSalePrice" placeholder="Optional" min="0" step="0.01" />
          </div>
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label>Category *</label>
            <select id="pCategory">
              <option value="Outerwear">Outerwear</option>
              <option value="Tops">Tops</option>
              <option value="Bottoms">Bottoms</option>
              <option value="Dresses">Dresses</option>
              <option value="Knitwear">Knitwear</option>
              <option value="Accessories">Accessories</option>
            </select>
          </div>
          <div class="form-group">
            <label>Badge</label>
            <select id="pBadge">
              <option value="">None</option>
              <option value="new">New</option>
              <option value="sale">Sale</option>
              <option value="limited">Limited</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="pDesc" placeholder="Product description..."></textarea>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="pImage" placeholder="https://images.unsplash.com/..." />
        </div>
        <div class="form-row-2">
          <div class="form-group">
            <label>Stock Qty</label>
            <input type="number" id="pStock" placeholder="100" min="0" />
          </div>
          <div class="form-group">
            <label>Rating (0–5)</label>
            <input type="number" id="pRating" placeholder="4.5" min="0" max="5" step="0.1" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <a href="index.html">LUXE</a>
        <span>Admin Dashboard</span>
      </div>
      <nav class="admin-nav">
        <div class="admin-nav-section">Main</div>
        <div class="admin-nav-item active" onclick="showSection('overview')">
          <span class="nav-icon">📊</span> Overview
        </div>
        <div class="admin-nav-section">Catalog</div>
        <div class="admin-nav-item" onclick="showSection('products')">
          <span class="nav-icon">👗</span> Products
        </div>
        <div class="admin-nav-section">Sales</div>
        <div class="admin-nav-item" onclick="showSection('orders')">
          <span class="nav-icon">📦</span> Orders
          <span class="badge" id="pendingBadge">0</span>
        </div>
        <div class="admin-nav-section">Users</div>
        <div class="admin-nav-item" onclick="showSection('customers')">
          <span class="nav-icon">👤</span> Customers
        </div>
        <div class="admin-nav-section">Feedback</div>
        <div class="admin-nav-item" onclick="showSection('reviews')">
          <span class="nav-icon">⭐</span> Reviews
        </div>
      </nav>
      <div class="admin-footer">
        <div class="admin-user">
          <div class="admin-avatar">A</div>
          <div class="admin-user-info">
            <div class="admin-user-name">Admin</div>
            <div class="admin-user-role">admin@luxestore.com</div>
          </div>
          <a href="index.html" title="Exit Admin" style="color:var(--text-muted); font-size:1rem; text-decoration:none;">⬡</a>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 id="sectionTitle">Overview</h1>
        <div class="topbar-actions">
          <button class="btn btn-outline" style="padding:9px 20px; font-size:0.75rem;" onclick="window.open('index.html', '_blank')">View Store ↗</button>
          <button class="btn btn-primary" id="addBtn" style="padding:9px 20px; font-size:0.75rem; display:none;" onclick="openAddModal()">+ Add Product</button>
          <button class="btn btn-ghost" style="padding:9px 14px;" onclick="Auth.logout(); window.location.href='login.html';">Logout</button>
        </div>
      </div>

      <div class="admin-content">

        <!-- Overview Section -->
        <div id="section-overview" class="admin-section active">
          <div class="stats-grid" id="statsGrid"></div>
          <div class="admin-grid">
            <div class="admin-panel">
              <div class="panel-header">
                <h3>Recent Orders</h3>
                <a href="#" onclick="showSection('orders'); return false;" style="font-size:0.78rem; color:var(--gold);">View All →</a>
              </div>
              <div class="panel-body">
                <table class="data-table" id="recentOrdersTable"></table>
              </div>
            </div>
            <div class="admin-panel">
              <div class="panel-header"><h3>Top Products</h3></div>
              <div class="panel-body">
                <ul class="top-products-list" id="topProductsList"></ul>
              </div>
            </div>
          </div>
        </div>

        <!-- Products Section -->
        <div id="section-products" class="admin-section">
          <div class="toolbar">
            <input type="text" placeholder="Search products..." id="productSearch" oninput="filterProducts()" />
            <select id="productCatFilter" onchange="filterProducts()">
              <option value="">All Categories</option>
              <option>Outerwear</option><option>Tops</option><option>Bottoms</option>
              <option>Dresses</option><option>Knitwear</option><option>Accessories</option>
            </select>
          </div>
          <div class="admin-panel">
            <div class="panel-body">
              <table class="data-table" id="productsTable"></table>
            </div>
          </div>
        </div>

        <!-- Orders Section -->
        <div id="section-orders" class="admin-section">
          <div class="toolbar">
            <input type="text" placeholder="Search by order ID..." id="orderSearch" oninput="filterOrders()" />
            <select id="orderStatusFilter" onchange="filterOrders()">
              <option value="">All Statuses</option>
              <option>pending</option><option>processing</option><option>shipped</option>
              <option>delivered</option><option>cancelled</option>
            </select>
          </div>
          <div class="admin-panel">
            <div class="panel-body">
              <table class="data-table" id="ordersTable"></table>
            </div>
          </div>
        </div>

        <!-- Customers Section -->
        <div id="section-customers" class="admin-section">
          <div class="admin-panel">
            <div class="panel-body">
              <table class="data-table" id="customersTable"></table>
            </div>
          </div>
        </div>

        <!-- Reviews Section -->
        <div id="section-reviews" class="admin-section">
          <div class="admin-panel">
            <div class="panel-body">
              <table class="data-table" id="reviewsTable"></table>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="js/core.js"></script>
  <script>
    function checkAdmin() {
      const session = Auth.getSession();
      if (!session || !session.isAdmin) {
        window.location.href = 'login.html';
      }
    }

    function showSection(name) {
      document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.admin-nav-item').forEach(i => i.classList.remove('active'));
      document.getElementById(`section-${name}`).classList.add('active');
      document.querySelectorAll('.admin-nav-item').forEach(i => {
        if (i.textContent.toLowerCase().includes(name === 'overview' ? 'overview' : name)) {
          i.classList.add('active');
        }
      });
      const titles = { overview: 'Overview', products: 'Products', orders: 'Orders', customers: 'Customers', reviews: 'Reviews' };
      document.getElementById('sectionTitle').textContent = titles[name] || name;
      document.getElementById('addBtn').style.display = name === 'products' ? 'inline-flex' : 'none';

      if (name === 'products') renderProductsTable();
      else if (name === 'orders') renderOrdersTable();
      else if (name === 'customers') renderCustomersTable();
      else if (name === 'reviews') renderReviewsTable();
    }

    function renderOverview() {
      const products = Products.getAll();
      const orders = Orders.getAll();
      const users = Storage.get('luxe_users') || [];
      const reviews = Reviews.getAll();
      const revenue = orders.reduce((s, o) => s + (o.total || 0), 0);
      const pending = orders.filter(o => o.status === 'pending').length;

      document.getElementById('pendingBadge').textContent = pending;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value" style="color:var(--gold)">${Utils.formatPrice(revenue)}</div>
          <div class="stat-change up">↑ 12.4% this month</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Orders</div>
          <div class="stat-value">${orders.length}</div>
          <div class="stat-change up">↑ ${pending} pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Products</div>
          <div class="stat-value">${products.length}</div>
          <div class="stat-change" style="color:var(--text-muted)">Across 6 categories</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Customers</div>
          <div class="stat-value">${users.length}</div>
          <div class="stat-change up">↑ ${reviews.length} reviews</div>
        </div>`;

      // Recent orders table
      const recent = [...orders].reverse().slice(0, 6);
      if (recent.length === 0) {
        document.getElementById('recentOrdersTable').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-muted)">No orders yet</td></tr>';
      } else {
        document.getElementById('recentOrdersTable').innerHTML = `
          <thead><tr>
            <th>Order ID</th><th>Customer</th><th>Date</th><th>Total</th><th>Status</th>
          </tr></thead>
          <tbody>${recent.map(o => `
            <tr>
              <td style="color:var(--gold);font-weight:600">#${o.id}</td>
              <td>${o.shipping?.address?.name || 'Guest'}</td>
              <td style="color:var(--text-muted)">${Utils.formatDate(o.createdAt)}</td>
              <td style="font-weight:600">${Utils.formatPrice(o.total)}</td>
              <td><span class="status-badge status-${o.status}">${o.status}</span></td>
            </tr>`).join('')}
          </tbody>`;
      }

      // Top products
      const prods = products.slice(0, 5);
      document.getElementById('topProductsList').innerHTML = prods.map((p, i) => `
        <li class="top-product-item">
          <div class="rank">${i + 1}</div>
          <img src="${p.images ? p.images[0] : 'https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=100'}"
               alt="${p.name}" class="top-product-img"
               onerror="this.src='https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=100'" />
          <div class="top-product-info">
            <div class="top-product-name">${p.name}</div>
            <div class="top-product-sales">${p.category}</div>
          </div>
          <div class="top-product-revenue">${Utils.formatPrice(p.salePrice || p.price)}</div>
        </li>`).join('');
    }

    function renderProductsTable(list) {
      const products = list || Products.getAll();
      const header = `<thead><tr>
        <th>Product</th><th>Category</th><th>Price</th><th>Badge</th><th>Stock</th><th>Actions</th>
      </tr></thead>`;
      const body = products.length === 0
        ? '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">No products found</td></tr>'
        : products.map(p => `
          <tr>
            <td><div class="product-cell">
              <img src="${p.images ? p.images[0] : ''}" alt="${p.name}" class="product-thumb"
                   onerror="this.src='https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=100'" />
              <div class="product-cell-info">
                <div class="name">${p.name}</div>
                <div class="cat">ID: ${p.id}</div>
              </div>
            </div></td>
            <td>${p.category}</td>
            <td>${p.salePrice ? `<span style="text-decoration:line-through;color:var(--text-muted);font-size:0.75rem">${Utils.formatPrice(p.price)}</span> ${Utils.formatPrice(p.salePrice)}` : Utils.formatPrice(p.price)}</td>
            <td>${p.badge ? `<span class="status-badge status-${p.badge === 'sale' ? 'processing' : p.badge === 'new' ? 'delivered' : 'shipped'}">${p.badge}</span>` : '—'}</td>
            <td>${p.stock || 'N/A'}</td>
            <td><div class="action-btns">
              <button class="action-btn" onclick="openEditModal(${p.id})">Edit</button>
              <button class="action-btn danger" onclick="deleteProduct(${p.id})">Delete</button>
            </div></td>
          </tr>`).join('');
      document.getElementById('productsTable').innerHTML = header + `<tbody>${body}</tbody>`;
    }

    function filterProducts() {
      const query = document.getElementById('productSearch').value.toLowerCase();
      const cat = document.getElementById('productCatFilter').value;
      let products = Products.getAll();
      if (query) products = products.filter(p => p.name.toLowerCase().includes(query));
      if (cat) products = products.filter(p => p.category === cat);
      renderProductsTable(products);
    }

    function renderOrdersTable(list) {
      const orders = list || [...Orders.getAll()].reverse();
      const header = `<thead><tr>
        <th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Date</th><th>Status</th><th>Actions</th>
      </tr></thead>`;
      const body = orders.length === 0
        ? '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">No orders yet</td></tr>'
        : orders.map(o => `
          <tr>
            <td style="color:var(--gold);font-weight:600">#${o.id}</td>
            <td>${o.shipping?.address?.name || 'Guest'}<br><span style="font-size:0.72rem;color:var(--text-muted)">${o.shipping?.address?.email || ''}</span></td>
            <td>${o.items?.length || 0} item(s)</td>
            <td style="font-weight:600">${Utils.formatPrice(o.total)}</td>
            <td style="color:var(--text-muted)">${Utils.formatDate(o.createdAt)}</td>
            <td><span class="status-badge status-${o.status}">${o.status}</span></td>
            <td><select onchange="updateOrderStatus(${o.id}, this.value)" style="background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);padding:4px 8px;font-size:0.72rem;border-radius:2px;cursor:pointer;">
              ${['pending','processing','shipped','delivered','cancelled'].map(s => `<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
            </select></td>
          </tr>`).join('');
      document.getElementById('ordersTable').innerHTML = header + `<tbody>${body}</tbody>`;
    }

    function filterOrders() {
      const query = document.getElementById('orderSearch').value.toLowerCase();
      const status = document.getElementById('orderStatusFilter').value;
      let orders = [...Orders.getAll()].reverse();
      if (query) orders = orders.filter(o => String(o.id).includes(query));
      if (status) orders = orders.filter(o => o.status === status);
      renderOrdersTable(orders);
    }

    function updateOrderStatus(id, status) {
      Orders.updateStatus(id, status);
      Toast.show(`Order #${id} marked as ${status}`, 'success');
      renderOverview();
    }

    function renderCustomersTable() {
      const users = Storage.get('luxe_users') || [];
      const header = `<thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Orders</th></tr></thead>`;
      const orders = Orders.getAll();
      const body = users.length === 0
        ? '<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-muted)">No customers yet</td></tr>'
        : users.map(u => {
            const userOrders = orders.filter(o => o.shipping?.address?.email === u.email).length;
            return `<tr>
              <td>${u.firstName} ${u.lastName}</td>
              <td>${u.email}</td>
              <td style="color:var(--text-muted)">${Utils.formatDate(u.createdAt)}</td>
              <td>${userOrders}</td>
            </tr>`;
          }).join('');
      document.getElementById('customersTable').innerHTML = header + `<tbody>${body}</tbody>`;
    }

    function renderReviewsTable() {
      const reviews = Reviews.getAll();
      const products = Products.getAll();
      const header = `<thead><tr><th>Product</th><th>Author</th><th>Rating</th><th>Comment</th><th>Date</th></tr></thead>`;
      const body = reviews.length === 0
        ? '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-muted)">No reviews yet</td></tr>'
        : [...reviews].reverse().map(r => {
            const p = products.find(x => x.id === r.productId);
            return `<tr>
              <td>${p ? p.name : `#${r.productId}`}</td>
              <td>${r.author}</td>
              <td>${Utils.renderStars(r.rating)} <span style="color:var(--text-muted);font-size:0.8rem">(${r.rating})</span></td>
              <td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.comment}</td>
              <td style="color:var(--text-muted)">${Utils.formatDate(r.date)}</td>
            </tr>`;
          }).join('');
      document.getElementById('reviewsTable').innerHTML = header + `<tbody>${body}</tbody>`;
    }

    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'Add New Product';
      document.getElementById('editingId').value = '';
      ['pName','pPrice','pSalePrice','pDesc','pImage'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('pCategory').value = 'Outerwear';
      document.getElementById('pBadge').value = '';
      document.getElementById('pStock').value = '50';
      document.getElementById('pRating').value = '4.5';
      document.getElementById('productModal').classList.add('open');
    }

    function openEditModal(id) {
      const p = Products.getById(id);
      if (!p) return;
      document.getElementById('modalTitle').textContent = 'Edit Product';
      document.getElementById('editingId').value = id;
      document.getElementById('pName').value = p.name;
      document.getElementById('pPrice').value = p.price;
      document.getElementById('pSalePrice').value = p.salePrice || '';
      document.getElementById('pCategory').value = p.category;
      document.getElementById('pBadge').value = p.badge || '';
      document.getElementById('pDesc').value = p.description || '';
      document.getElementById('pImage').value = p.images ? p.images[0] : '';
      document.getElementById('pStock').value = p.stock || '';
      document.getElementById('pRating').value = p.rating || '4.5';
      document.getElementById('productModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('productModal').classList.remove('open');
    }

    function saveProduct() {
      const name = document.getElementById('pName').value.trim();
      const price = parseFloat(document.getElementById('pPrice').value);
      if (!name || isNaN(price)) {
        Toast.show('Name and price are required.', 'error'); return;
      }
      const data = {
        name,
        price,
        salePrice: parseFloat(document.getElementById('pSalePrice').value) || null,
        category: document.getElementById('pCategory').value,
        badge: document.getElementById('pBadge').value || null,
        description: document.getElementById('pDesc').value,
        images: [document.getElementById('pImage').value || 'https://images.unsplash.com/photo-1558769132-cb1aea458c5e?w=600'],
        stock: parseInt(document.getElementById('pStock').value) || 50,
        rating: parseFloat(document.getElementById('pRating').value) || 4.5,
        reviews: 0, sizes: ['XS','S','M','L','XL'], colors: ['Black','White','Grey']
      };
      const editId = document.getElementById('editingId').value;
      if (editId) {
        Products.update(parseInt(editId), data);
        Toast.show('Product updated.', 'success');
      } else {
        Products.add(data);
        Toast.show('Product added.', 'success');
      }
      closeModal();
      renderProductsTable();
      renderOverview();
    }

    function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      Products.delete(id);
      Toast.show('Product deleted.', 'info');
      renderProductsTable();
      renderOverview();
    }

    // Close modal on overlay click
    document.getElementById('productModal').addEventListener('click', e => {
      if (e.target === document.getElementById('productModal')) closeModal();
    });

    document.addEventListener('DOMContentLoaded', () => {
      checkAdmin();
      renderOverview();
    });
  </script>
</body>
</html>
